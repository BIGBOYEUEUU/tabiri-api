version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tabiri_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       tabiri
      POSTGRES_USER:     tabiri
      POSTGRES_PASSWORD: tabiri
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabiri"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tabiri_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
